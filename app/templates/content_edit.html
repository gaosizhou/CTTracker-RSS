{% extends "base.html" %}
{% block content %}
<section class="page-head content-head">
  <div>
    <h1>{{ tr("edit", lang) }}</h1>
    <p>{{ tr(item.content_type.value ~ "s", lang) }} | {{ item.title }}</p>
  </div>
  <a class="button-link" href="/content/{{ item.id }}">{{ tr("back", lang) }}</a>
</section>

<form class="edit-form" method="post" action="/content/{{ item.id }}/edit">
  <section class="form-section">
    <h2>{{ tr("content", lang) }}</h2>
    <div class="form-grid">
      <label>{{ tr("title", lang) }}<input name="title" required value="{{ item.title }}"></label>
      <label>{{ tr("chinese_title", lang) }}<input name="chinese_title" value="{{ item.chinese_title }}"></label>
      <label>{{ tr("creator", lang) }}<input name="creator_text" value="{{ item.creator_text }}"></label>
      <label>{{ tr("platform", lang) }}<input name="platform" value="{{ item.platform }}"></label>
      <label>{{ tr("year", lang) }}<input name="year" value="{{ item.year or '' }}" inputmode="numeric"></label>
      <label>{{ tr("open_link", lang) }}<input name="url" value="{{ item.url or '' }}"></label>
      <label>PDF<input name="pdf_url" value="{{ item.pdf_url or '' }}"></label>
    </div>
  </section>

  <section class="form-section">
    <h2>{{ tr("status", lang) }}</h2>
    <div class="form-grid compact-grid">
      <label>{{ tr("status", lang) }}<select name="status">{% for status in statuses %}<option value="{{ status.value }}" {% if state.status.value == status.value %}selected{% endif %}>{{ status.value }}</option>{% endfor %}</select></label>
      <label class="check boxed-check"><input type="checkbox" name="favorite" value="true" {% if state.favorite %}checked{% endif %}>{{ tr("favorite", lang) }}</label>
      <label class="check boxed-check"><input type="checkbox" name="in_focus" value="true" {% if state.in_focus %}checked{% endif %}>{{ tr("focus", lang) }}</label>
      <label>{{ tr("tags", lang) }}<details class="dropdown-filter"><summary>{{ tr("choose_tags", lang) }}</summary><div class="dropdown-panel">{% for tag in tags %}<label class="check"><input type="checkbox" name="tag_ids" value="{{ tag.id }}" {% if tag.id in selected_tag_ids %}checked{% endif %}>{{ tag.name }}</label>{% else %}<span class="muted">{{ tr("no_tags", lang) }}</span>{% endfor %}</div></details></label>
    </div>
  </section>

  <section class="form-section">
    <h2>{{ tr("notes", lang) }}</h2>
    <label>{{ tr("abstract", lang) }}<textarea name="description" rows="7">{{ item.description }}</textarea></label>
    <label>{{ tr("notes", lang) }}<textarea name="notes" rows="7">{{ state.notes }}</textarea></label>
  </section>

  <div class="form-actions">
    <button type="submit">{{ tr("save", lang) }}</button>
    <a class="button-link" href="/content/{{ item.id }}">{{ tr("back", lang) }}</a>
  </div>
</form>
{% endblock %}
